#docker compose up -d --build
services:
  gateway-service:
    build:
      context: ./src/service/gateway-service
    container_name: presfm-gateway-service
    environment:
      PORT: 8000
      AUTH_SERVICE_URL: http://auth-service:8001
      VIDEO_SERVICE_URL: http://video-service:8003
      STORAGE_SERVICE_URL: http://storage-service:8004
      OPENSFM_SERVICE_URL: http://opensfm-service:8005
      EVALUATION_SERVICE_URL: http://evaluation-service:8006
    ports:
      - '8000:8000'
    depends_on:
      auth-service:
        condition: service_started
      video-service:
        condition: service_started
      mask-generation-service:
        condition: service_started
      storage-service:
        condition: service_started
      opensfm-service:
        condition: service_started
      evaluation-service:
        condition: service_started
      segmentation-service:
        condition: service_started
    networks:
      - presfm-network

  auth-service:
    build:
      context: ./src/service/auth-service
    container_name: presfm-auth-service
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      PORT: 8001
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_SECONDS: ${JWT_ACCESS_EXPIRES_SECONDS:-900}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      # ── SMTP ──────────────────────────────
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
    ports:
      - '8001:8001'
    networks:
      - presfm-network

  storage-service:
    build:
      context: ./src/service/storage-service
    container_name: presfm-storage-service
    environment:
      PORT: 8004
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_DEFAULT_BUCKET: ${SUPABASE_DEFAULT_BUCKET:-presfm}
      LOCAL_STORAGE_ROOT: /data/presfm-storage
    ports:
      - '8004:8004'
    volumes:
      - presfm-storage-data:/data/presfm-storage
    networks:
      - presfm-network

  redis:
    image: redis:7-alpine
    container_name: presfm-redis
    ports:
      - '6379:6379'
    networks:
      - presfm-network

  video-service:
    build:
      context: ./src/service/video-service
    container_name: presfm-video-service
    environment:
      PORT: 8003
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      FULL_PIPELINE_CONCURRENCY: 1
      SUPABASE_URL: ${SUPABASE_URL}
      STORAGE_SERVICE_URL: http://storage-service:8004
      MASK_GENERATION_SERVICE_URL: http://mask-generation-service:8002
      VIDEO_BUCKET: ${VIDEO_BUCKET:-videos}
      OPENSFM_SERVICE_URL: http://opensfm-service:8005
      INTERNAL_API_URL: http://gateway-service:8000/api
      PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - '8003:8003'
    depends_on:
      redis:
        condition: service_started
      storage-service:
        condition: service_started
      mask-generation-service:
        condition: service_started
    networks:
      - presfm-network

  mask-generation-service:
    build:
      context: ./src/service/mask-generation-service
    container_name: presfm-mask-generation-service
    environment:
      PORT: 8002
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      STORAGE_SERVICE_URL: http://storage-service:8004
      SUPABASE_DEFAULT_BUCKET: ${SUPABASE_DEFAULT_BUCKET:-presfm}
      SEGMENTATION_SERVICE_URL: http://segmentation-service:5000
    ports:
      - '8002:8002'
    depends_on:
      storage-service:
        condition: service_started
      segmentation-service:
        condition: service_started
    networks:
      - presfm-network

  opensfm-service:
    build:
      context: ./src/service/opensfm-service
    container_name: presfm-opensfm-service
    environment:
      PORT: 8005
      STORAGE_SERVICE_URL: http://storage-service:8004
      SUPABASE_DEFAULT_BUCKET: ${SUPABASE_DEFAULT_BUCKET:-presfm}
      OPENSFM_WORKSPACE: /workspace/opensfm-runs
      OPENSFM_BIN: /opt/OpenSfM/bin/opensfm
      OPENSFM_ROOT: /opt/OpenSfM
    volumes:
      - opensfm-workspace:/workspace/opensfm-runs
    ports:
      - '8005:8005'
    depends_on:
      storage-service:
        condition: service_started
    networks:
      - presfm-network

  evaluation-service:
    build:
      context: ./src/service/evaluation-service
    container_name: presfm-evaluation-service
    environment:
      PORT: 8006
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      STORAGE_SERVICE_URL: http://storage-service:8004
    ports:
      - '8006:8006'
    depends_on:
      storage-service:
        condition: service_started
    networks:
      - presfm-network

  segmentation-service:
    build:
      context: ./src/service/segmentation-service
    container_name: presfm-segmentation-service
    environment:
      PORT: 5000
      MODEL_PATH: /models/Segformer_model.pth
      MODEL_ARCH: Segformer
      ENCODER_NAME: resnet50
      NUM_CLASSES: 2
      FOREGROUND_CLASS_ID: 1
      INPUT_SIZE: 768
      MODEL_MEAN: 0.485,0.456,0.406
      MODEL_STD: 0.229,0.224,0.225
      DEVICE: cpu
      STRICT_LOAD: 'false'
      MIN_FOREGROUND_RATIO: 0.001
    volumes:
      - ./src/service/segmentation-service/models:/models
    ports:
      - '5000:5000'
    networks:
      - presfm-network

volumes:
  presfm-storage-data:
  opensfm-workspace:

networks:
  presfm-network:
    driver: bridge
