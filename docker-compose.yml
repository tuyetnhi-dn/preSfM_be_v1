#docker compose up -d --build
services:
  gateway-service:
    build:
      context: ./src/service/gateway-service
    container_name: presfm-gateway-service
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      VIDEO_SERVICE_URL: http://video-service:3003
      STORAGE_SERVICE_URL: http://storage-service:3004
      OPENSFM_SERVICE_URL: http://opensfm-service:3005
      EVALUATION_SERVICE_URL: http://evaluation-service:3006
    ports:
      - '3000:3000'
    depends_on:
      auth-service:
        condition: service_started
      video-service:
        condition: service_started
      storage-service:
        condition: service_started
      opensfm-service:
        condition: service_started
      evaluation-service:
        condition: service_started
    networks:
      - presfm-network

  auth-service:
    build:
      context: ./src/service/auth-service
    container_name: presfm-auth-service
    environment:
      NODE_OPTIONS: --dns-result-order=ipv4first
      PORT: 3001
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_ACCESS_EXPIRES_SECONDS: ${JWT_ACCESS_EXPIRES_SECONDS:-900}
      JWT_REFRESH_EXPIRES_DAYS: ${JWT_REFRESH_EXPIRES_DAYS:-7}
      # ── SMTP ──────────────────────────────
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      OTP_EXPIRES_MINUTES: ${OTP_EXPIRES_MINUTES:-10}
    ports:
      - '3001:3001'
    networks:
      - presfm-network

  storage-service:
    build:
      context: ./src/service/storage-service
    container_name: presfm-storage-service
    environment:
      PORT: 3004
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SUPABASE_DEFAULT_BUCKET: ${SUPABASE_DEFAULT_BUCKET:-presfm}
      LOCAL_STORAGE_ROOT: /data/presfm-storage
    ports:
      - '3004:3004'
    volumes:
      - presfm-storage-data:/data/presfm-storage
    networks:
      - presfm-network

  video-service:
    build:
      context: ./src/service/video-service
    container_name: presfm-video-service
    environment:
      PORT: 3003
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      STORAGE_SERVICE_URL: http://storage-service:3004
      VIDEO_BUCKET: ${VIDEO_BUCKET:-videos}
    ports:
      - '3003:3003'
    depends_on:
      storage-service:
        condition: service_started
    networks:
      - presfm-network

  opensfm-service:
    build:
      context: ./src/service/opensfm-service
    container_name: presfm-opensfm-service
    environment:
      PORT: 3005
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      OPENSFM_WORKER_URL: ${OPENSFM_WORKER_URL:-}
    ports:
      - '3005:3005'
    networks:
      - presfm-network

  evaluation-service:
    build:
      context: ./src/service/evaluation-service
    container_name: presfm-evaluation-service
    environment:
      PORT: 3006
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_SSL: ${POSTGRES_SSL}
      STORAGE_SERVICE_URL: http://storage-service:3004
    ports:
      - '3006:3006'
    depends_on:
      storage-service:
        condition: service_started
    networks:
      - presfm-network

volumes:
  presfm-storage-data:

networks:
  presfm-network:
    driver: bridge
